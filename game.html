<!doctype html>
<html>
  <head>
    <!-- font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Card Wars</title>
    <!-- css links -->
    <link rel="stylesheet" href="./styles/BMO/bmo.css" />
    <link rel="stylesheet" href="./styles/BMO/game.css" />
    <link rel="stylesheet" href="./styles/BMO/player-actions.css" />
  </head>
  <body>
    <div class="header-content">
      <div class="game-header-left-section">
        <a class="home-screen-link" href="title-Screen.html"
          ><p>Home Screen</p></a
        >
      </div>

      <div class="game-header-middle-section">
        <img class="BMO-smile" src="/images/download.png" />
      </div>
      <div class="game-header-right-section">
        <p>BMO</p>
      </div>
    </div>
    <div class="BMO-face">
      <!-- logo img-->
      <div class="logo">
        <img class="game-logo-img" src="/images/gameLogo.png" />
      </div>

      <!-- BMO cards container -->

      <div class="BMO-grid-cards-container">
        <div class="BMO-card">
          <img class="card-img-bmo" src="/images/blue-land-cards/Axey.webp" />
        </div>

        <div class="BMO-card">
          <img
            class="card-img-bmo"
            src="/images/blue-land-cards/Cool_Dog.webp"
          />
        </div>

        <div class="BMO-card">
          <img
            class="card-img-bmo"
            src="/images/blue-land-cards/Psionic_Architect.webp"
          />
        </div>

        <div class="BMO-card">
          <img
            class="card-img-bmo"
            src="/images/blue-land-cards/Punk_Cat.webp"
          />
        </div>
      </div>

      <!--player cards container-->
      <div class="player-grid-cards-container">
        <div class="player-cards">
          <img class="card-img" src="/images/Corn-land-cards/Archer_Dan.webp" />
        </div>

        <div class="player-cards">
          <img
            class="card-img"
            src="/images/Corn-land-cards/Captain_Taco.webp"
          />
        </div>

        <div class="player-cards">
          <img class="card-img" src="/images/Corn-land-cards/Corn_Dog.webp" />
        </div>

        <div class="player-cards">
          <img class="card-img" src="/images/Corn-land-cards/Corn_Ronin.webp" />
        </div>
      </div>

      <div class="player-actions-grid">
        <div class="actions-grid-left-section">
          <div class="actions">
            <span> <button class="menu-txt1">>Score</button> </span>
            <span> <button class="menu-txt2">>Store</button> </span>
            <span> <button class="menu-txt3">Auto Play</button> </span>
          </div>
        </div>

        <div class="actions-grid-middle-section">
          <div class="melds">
            <div class="meld">
              <img
                class="meld-img"
                src="./images/Corn-land-cards/Ethan_Allfire.webp"
              />
            </div>
            <div class="meld">
              <img
                class="meld-img"
                src="./images/Corn-land-cards/Huskerbat.webp"
              />
            </div>
            <div class="meld">
              <img
                class="meld-img"
                src="./images/Corn-land-cards/Patchy_the_Pumpkin.webp"
              />
            </div>
            <div class="meld">
              <img
                class="meld-img"
                src="./images/Corn-land-cards/Husker_Knight.webp"
              />
            </div>
          </div>
        </div>
        <div class="actions-grid-rigth-section">
          <div class="back-cards-container">
            <img class="back-card-img" src="./images/card-image.png" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
